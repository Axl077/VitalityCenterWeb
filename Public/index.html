<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitality Center</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
    }

    header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      margin: 24px auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .full {
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      background: white;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #eaf1ff;
      color: #1e3a8a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vitality Center</h1>
    <p>Registro y búsqueda de clientes con membresía</p>
  </header>

  <div class="container">
    <div class="grid">
      <div class="card">
        <h2>Registrar cliente con membresía</h2>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="email" id="correo" placeholder="Correo">
        <select id="id_membresia"></select>
        <input type="date" id="fecha_inicio">

        <button onclick="registrarCompleto()">Guardar registro</button>
        <div id="registroStatus"></div>
      </div>

      <div class="card">
        <h2>Buscar clientes</h2>

        <input type="text" id="buscarTexto" placeholder="Buscar por nombre o correo">
        <button onclick="buscarClientes()">Buscar</button>
        <button onclick="cargarClientes()">Mostrar todos</button>

        <div id="buscarStatus"></div>
      </div>
    </div>

    <div class="card full">
      <h2>Listado de clientes</h2>
      <div id="tablaClientes"></div>
    </div>
  </div>

  <script>
    function mostrarEstado(id, mensaje, tipo) {
      document.getElementById(id).innerHTML =
        `<div class="status ${tipo}">${mensaje}</div>`;
    }

    async function cargarMembresias() {
      try {
        const res = await fetch('/api/membresias');
        const data = await res.json();

        const select = document.getElementById('id_membresia');
        select.innerHTML = '<option value="">Selecciona una membresía</option>';

        data.forEach(m => {
          select.innerHTML += `
            <option value="${m.id_membresia}">
              ${m.nombre} - ${m.duracion_dias} días
            </option>
          `;
        });
      } catch (error) {
        mostrarEstado('registroStatus', 'No se pudieron cargar las membresías', 'error');
      }
    }

    async function registrarCompleto() {
      const nombre = document.getElementById('nombre').value;
      const telefono = document.getElementById('telefono').value;
      const correo = document.getElementById('correo').value;
      const id_membresia = document.getElementById('id_membresia').value;
      const fecha_inicio = document.getElementById('fecha_inicio').value;

      try {
        const res = await fetch('/api/registro-completo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre,
            telefono,
            correo,
            id_membresia,
            fecha_inicio
          })
        });

        const data = await res.json();

        if (!res.ok) {
          mostrarEstado('registroStatus', data.detalle || data.error || 'Error al registrar', 'error');
          return;
        }

        mostrarEstado('registroStatus', data.mensaje, 'ok');

        document.getElementById('nombre').value = '';
        document.getElementById('telefono').value = '';
        document.getElementById('correo').value = '';
        document.getElementById('id_membresia').value = '';
        document.getElementById('fecha_inicio').value = '';

        cargarClientes();
      } catch (error) {
        mostrarEstado('registroStatus', 'Error del servidor', 'error');
      }
    }

    async function buscarClientes() {
      const texto = document.getElementById('buscarTexto').value;

      try {
        const res = await fetch('/api/buscar-clientes?texto=' + encodeURIComponent(texto));
        const data = await res.json();

        renderTabla(data);

        if (data.length === 0) {
          mostrarEstado('buscarStatus', 'No se encontraron resultados', 'error');
        } else {
          mostrarEstado('buscarStatus', 'Búsqueda completada', 'ok');
        }
      } catch (error) {
        mostrarEstado('buscarStatus', 'Error al buscar clientes', 'error');
      }
    }

    async function cargarClientes() {
      try {
        const res = await fetch('/api/clientes');
        const data = await res.json();
        renderTabla(data);
      } catch (error) {
        document.getElementById('tablaClientes').innerHTML = 'Error al cargar clientes';
      }
    }

    function renderTabla(data) {
      let html = `
        <table>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Correo</th>
            <th>Membresía</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Estado</th>
          </tr>
      `;

      data.forEach(c => {
        html += `
          <tr>
            <td>${c.id_cliente ?? ''}</td>
            <td>${c.nombre ?? ''}</td>
            <td>${c.telefono ?? ''}</td>
            <td>${c.correo ?? ''}</td>
            <td>${c.membresia ?? 'Sin membresía'}</td>
            <td>${c.fecha_inicio ?? ''}</td>
            <td>${c.fecha_fin ?? ''}</td>
            <td>${c.estado ?? ''}</td>
          </tr>
        `;
      });

      html += `</table>`;
      document.getElementById('tablaClientes').innerHTML = html;
    }

    cargarMembresias();
    cargarClientes();
  </script>
</body>
</html>
