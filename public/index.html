<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vitality Center</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:20px auto;
  border-radius:10px;
  max-width:500px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.red{background:#ef4444;}
.blue{background:#3b82f6;}

</style>
</head>

<body>

<h1>Vitality Center 💪</h1>

<div class="card">
<h2>Cancelar suscripción</h2>

<input id="id" placeholder="ID suscripción">
<button class="red" onclick="cancelar()">Cancelar</button>

<p id="msg"></p>
</div>

<button class="blue" onclick="location.href='admin.html'">
Administración
</button>

<script>
async function cancelar(){
  const id=document.getElementById('id').value;

  const r=await fetch('/cancelar/'+id,{method:'PUT'});

  document.getElementById('msg').innerText='Cancelado';
}
</script>

</body>
</html>
