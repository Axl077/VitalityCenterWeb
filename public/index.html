<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vitality Center</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center }
.container { width: 400px; margin:auto }
input, select, button { width:100%; margin:5px; padding:10px }
button { background:#22c55e; color:white; border:none }
.admin-btn { background:#3b82f6 }
</style>
</head>

<body>

<h1>Vitality Center 💪</h1>

<div class="container">

<h3>🔍 Buscar cliente</h3>
<input id="telefono" placeholder="Teléfono">
<button onclick="buscar()">Buscar</button>

<h3>🆕 Registro</h3>
<input id="nombre" placeholder="Nombre">
<input id="tel2" placeholder="Teléfono">
<input id="email" placeholder="Email">
<button onclick="registrar()">Registrar</button>

<h3>📦 Suscripción</h3>
<input id="cliente_id" placeholder="ID cliente">
<select id="tipo">
  <option value="mensual">Mensual</option>
  <option value="anual">Anual</option>
</select>
<input id="fecha" type="date">
<button onclick="suscribir()">Activar / Renovar</button>

<h3>❌ Cancelar</h3>
<input id="sub_id" placeholder="ID suscripción">
<button onclick="cancelar()">Cancelar</button>

<br><br>

<button class="admin-btn" onclick="window.location='/admin.html'">
Área Administrativa
</button>

</div>

<script>
async function registrar(){
  await fetch('/api/clientes',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nombre: nombre.value,
      telefono: tel2.value,
      email: email.value
    })
  });
  alert("Registrado");
}

async function buscar(){
  let r = await fetch('/api/clientes/'+telefono.value);
  let d = await r.json();
  alert(JSON.stringify(d));
}

async function suscribir(){
  await fetch('/api/suscripciones',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      cliente_id: cliente_id.value,
      tipo: tipo.value,
      fecha_fin: fecha.value
    })
  });
  alert("Suscripción activa");
}

async function cancelar(){
  await fetch('/api/cancelar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ id: sub_id.value })
  });
  alert("Cancelado");
}
</script>

</body>
</html>
