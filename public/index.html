<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vitality Center</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #22c55e;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #respuesta {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Vitality Center 💪</h1>
  <p>Servidor funcionando correctamente</p>

  <button onclick="probarAPI()">Probar conexión backend</button>

  <div id="respuesta"></div>

  <script>
    async function probarAPI() {
      try {
        const res = await fetch('/health');
        const texto = await res.text();
        document.getElementById('respuesta').innerText = texto;
      } catch (error) {
        document.getElementById('respuesta').innerText = 'Error conectando';
      }
    }
  </script>

</body>
</html>
