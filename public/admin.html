<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body { background:#020617; color:white; font-family:Arial; text-align:center }
table { width:90%; margin:auto; border-collapse:collapse }
td,th { border:1px solid white; padding:10px }
</style>
</head>

<body>

<h2>Login Admin</h2>
<input id="user" placeholder="usuario">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Entrar</button>

<div id="panel" style="display:none">

<h2>📊 Panel</h2>
<button onclick="cargar()">Actualizar</button>

<table id="tabla"></table>

</div>

<script>
async function login(){
  let r = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      user:user.value,
      pass:pass.value
    })
  });

  if(r.ok){
    panel.style.display='block';
  } else {
    alert("Error login");
  }
}

async function cargar(){
  let r = await fetch('/api/admin/listado');
  let data = await r.json();

  tabla.innerHTML = "<tr><th>Cliente</th><th>Tel</th><th>Tipo</th><th>Fin</th><th>Estado</th></tr>";

  data.forEach(x=>{
    tabla.innerHTML += `
    <tr>
      <td>${x.nombre}</td>
      <td>${x.telefono}</td>
      <td>${x.tipo || ''}</td>
      <td>${x.fecha_fin || ''}</td>
      <td>${x.activa ? 'Activa':'Cancelada'}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
